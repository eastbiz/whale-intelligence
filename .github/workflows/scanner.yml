name: Whale Intelligence Scanner

on:
  schedule:
    # 9:45 AM ET (14:45 UTC) — after open chaos settles
    - cron: '45 14 * * 1-5'
    # 12:00 PM ET (17:00 UTC) — midday institutional flow
    - cron: '0 17 * * 1-5'
    # 3:00 PM ET (20:00 UTC) — 1hr before close, time to act
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        env:
          UW_API_KEY:          ${{ secrets.UW_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          IBKR_FLEX_TOKEN:     ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID:  ${{ secrets.IBKR_FLEX_QUERY_ID }}
        run: python whale_scanner.py
