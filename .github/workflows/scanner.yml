name: Whale Intelligence Scanner

on:
  schedule:
    # ── PDT (UTC-7, Mar–Nov) ─────────────────────────────────
    # 6:47 AM PT  (13:47 UTC) — morning scan
    - cron: '47 13 * * 1-5'
    # 6:53 AM PT  (13:53 UTC) — backup: fires 6 min later if 13:47 was skipped
    - cron: '53 13 * * 1-5'
    # 9:41 AM PT  (16:41 UTC) — midday scan
    - cron: '41 16 * * 1-5'
    # 11:47 AM PT (18:47 UTC) — pre-close scan
    - cron: '47 18 * * 1-5'
    # ── PST (UTC-8, Nov–Mar) — uncomment block below, comment block above ──
    # 6:47 AM PT  (14:47 UTC)
    # - cron: '47 14 * * 1-5'
    # 6:53 AM PT  (14:53 UTC) — backup
    # - cron: '53 14 * * 1-5'
    # 9:41 AM PT  (17:41 UTC)
    # - cron: '41 17 * * 1-5'
    # 11:47 AM PT (19:47 UTC)
    # - cron: '47 19 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run (optional)'
        required: false
        default: 'manual trigger'

# Prevent pile-up: if a run is still queued when the next fires, cancel the queued one
# cancel-in-progress: false means a running scan completes — only the waiting one is dropped
concurrency:
  group: whale-scanner
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # kill hung runs — scanner should complete in under 8 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Log trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Reason: ${{ github.event.inputs.reason || 'scheduled' }}"

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          IBKR_FLEX_TOKEN:       ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID:    ${{ secrets.IBKR_FLEX_QUERY_ID }}
          SCHWAB_APP_KEY:        ${{ secrets.SCHWAB_APP_KEY }}
          SCHWAB_APP_SECRET:     ${{ secrets.SCHWAB_APP_SECRET }}
          SCHWAB_REFRESH_TOKEN:  ${{ secrets.SCHWAB_REFRESH_TOKEN }}
          SCHWAB_ACCESS_TOKEN:   ${{ secrets.SCHWAB_ACCESS_TOKEN }}
        run: python whale_scanner.py

      - name: Commit results
        run: |
          git config user.name "whale-scanner"
          git config user.email "scanner@whale-intelligence"
          if [ -f results.json ]; then
            git add -f results.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
            else
              git commit -m "scan results $(date -u '+%Y-%m-%d %H:%M UTC')"
              git push origin main || git pull --rebase origin main && git push origin main
              echo "results.json committed OK"
            fi
          else
            echo "WARNING: results.json not found"
          fi
