name: Whale Intelligence Scanner

on:
  schedule:
    # 6:31 AM PT / 9:31 AM ET (13:31 UTC) — just after open settles
    - cron: '31 13 * * 1-5'
    # 9:30 AM PT / 12:30 PM ET (16:30 UTC) — midday flow
    - cron: '30 16 * * 1-5'
    # 11:45 AM PT / 2:45 PM ET (18:45 UTC) — 75 min before close
    - cron: '45 18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          IBKR_FLEX_TOKEN:       ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID:    ${{ secrets.IBKR_FLEX_QUERY_ID }}
          SCHWAB_APP_KEY:        ${{ secrets.SCHWAB_APP_KEY }}
          SCHWAB_APP_SECRET:     ${{ secrets.SCHWAB_APP_SECRET }}
          SCHWAB_REFRESH_TOKEN:  ${{ secrets.SCHWAB_REFRESH_TOKEN }}
          SCHWAB_ACCESS_TOKEN:   ${{ secrets.SCHWAB_ACCESS_TOKEN }}
        run: python whale_scanner.py

      - name: Commit results
        run: |
          git config user.name "whale-scanner"
          git config user.email "scanner@whale-intelligence"
          git add results.json
          git diff --staged --quiet || git commit -m "scan results $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
